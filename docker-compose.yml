services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-legal_doc_ai}
      POSTGRES_USER: ${POSTGRES_USER:-legal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-legal} -d $${POSTGRES_DB:-legal_doc_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-legal}:${POSTGRES_PASSWORD:-legal}@postgres:5432/${POSTGRES_DB:-legal_doc_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-document_chunks}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-System Admin}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-bkai-foundation-models/vietnamese-bi-encoder}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/embeddings/bkai-vietnamese-bi-encoder}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-true}
      ALLOW_FAKE_EMBEDDINGS: ${ALLOW_FAKE_EMBEDDINGS:-true}
      CHUNKING_BACKEND: ${CHUNKING_BACKEND:-ocr_chunking}
      OCR_ENGINE: ${OCR_ENGINE:-paddle_vietocr}
      OCR_LANG: ${OCR_LANG:-vi}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      OCR_DEVICE: ${OCR_DEVICE:-cpu}
      OCR_MODEL_DIR: ${OCR_MODEL_DIR:-/models/ocr}
      OCR_PREPROCESS_MODE: ${OCR_PREPROCESS_MODE:-auto}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.0}
      OCR_RESTORE_VIETNAMESE_TERMS: ${OCR_RESTORE_VIETNAMESE_TERMS:-true}
      OCR_FALLBACK_ENGINE: ${OCR_FALLBACK_ENGINE:-}
      VIETOCR_MODEL_DIR: ${VIETOCR_MODEL_DIR:-/models/ocr/vietocr}
      VIETOCR_DEVICE: ${VIETOCR_DEVICE:-cpu}
      VIETOCR_CONFIG: ${VIETOCR_CONFIG:-vgg_transformer}
      VIETOCR_WEIGHT_PATH: ${VIETOCR_WEIGHT_PATH:-/models/ocr/vietocr/transformerocr.pth}
      VIETOCR_MAX_BATCH_SIZE: ${VIETOCR_MAX_BATCH_SIZE:-1}
      VIETOCR_BEAMSEARCH: ${VIETOCR_BEAMSEARCH:-false}
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./apps/api:/app
      - ./tests:/app/tests
      - ./models:/models
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-legal}:${POSTGRES_PASSWORD:-legal}@postgres:5432/${POSTGRES_DB:-legal_doc_ai}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-document_chunks}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-fake}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-bkai-foundation-models/vietnamese-bi-encoder}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/models/embeddings/bkai-vietnamese-bi-encoder}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-384}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-true}
      ALLOW_FAKE_EMBEDDINGS: ${ALLOW_FAKE_EMBEDDINGS:-true}
      CHUNKING_BACKEND: ${CHUNKING_BACKEND:-ocr_chunking}
      OCR_ENGINE: ${OCR_ENGINE:-paddle_vietocr}
      OCR_LANG: ${OCR_LANG:-vi}
      OCR_USE_GPU: ${OCR_USE_GPU:-false}
      OCR_DEVICE: ${OCR_DEVICE:-cpu}
      OCR_MODEL_DIR: ${OCR_MODEL_DIR:-/models/ocr}
      OCR_PREPROCESS_MODE: ${OCR_PREPROCESS_MODE:-auto}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-0.0}
      OCR_RESTORE_VIETNAMESE_TERMS: ${OCR_RESTORE_VIETNAMESE_TERMS:-true}
      OCR_FALLBACK_ENGINE: ${OCR_FALLBACK_ENGINE:-}
      VIETOCR_MODEL_DIR: ${VIETOCR_MODEL_DIR:-/models/ocr/vietocr}
      VIETOCR_DEVICE: ${VIETOCR_DEVICE:-cpu}
      VIETOCR_CONFIG: ${VIETOCR_CONFIG:-vgg_transformer}
      VIETOCR_WEIGHT_PATH: ${VIETOCR_WEIGHT_PATH:-/models/ocr/vietocr/transformerocr.pth}
      VIETOCR_MAX_BATCH_SIZE: ${VIETOCR_MAX_BATCH_SIZE:-1}
      VIETOCR_BEAMSEARCH: ${VIETOCR_BEAMSEARCH:-false}
    volumes:
      - ./apps/api:/app
      - ./apps/worker/runner.py:/app/worker_runner.py
      - ./tests:/app/tests
      - ./models:/models
      - uploads_data:/data/uploads
    command: python worker_runner.py
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  web:
    build:
      context: ./apps/web
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
