services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_doc_ai
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal -d legal_doc_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://legal:legal@postgres:5432/legal_doc_ai
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: document_chunks
      UPLOAD_DIR: /data/uploads
      JWT_SECRET_KEY: local-dev-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      ADMIN_FULL_NAME: System Admin
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./apps/api:/app
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://legal:legal@postgres:5432/legal_doc_ai
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: document_chunks
      UPLOAD_DIR: /data/uploads
      JWT_SECRET_KEY: local-dev-secret
    volumes:
      - ./apps/api:/app
      - ./apps/worker/runner.py:/app/worker_runner.py
      - uploads_data:/data/uploads
    command: python worker_runner.py
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  web:
    build:
      context: ./apps/web
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:
